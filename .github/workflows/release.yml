name: Release

on:
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "CODEX.md"
      - "GEMINI.md"
      - ".cursorrules"
      - ".factory/AGENTS.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Cognitive OS Update ${{ github.run_number }}
          body: |
            ## Changes

            ${{ steps.notes.outputs.notes }}

            ## Files Updated

            - AGENTS.md (master specification)
            - Harness adapters (CLAUDE.md, CODEX.md, GEMINI.md, .cursorrules, .factory/AGENTS.md)

            See [CONTRIBUTING.md](CONTRIBUTING.md) for details.
          generate_release_notes: true
          draft: false
          prerelease: false
